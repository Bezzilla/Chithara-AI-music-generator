{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chithara – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e8e6f0;
    }
    .card {
      background: #0e0e16;
      border: 0.5px solid #2a2a3a;
      border-radius: 18px;
      padding: 44px 40px;
      width: 400px;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #c8b8ff;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    .logo span { color: #7c5cbf; }
    .tagline { font-size: 13px; color: #6860a0; margin-bottom: 32px; }

    .field-label {
      display: block;
      font-size: 12px;
      color: #8884a0;
      margin-bottom: 5px;
    }
    .field-input {
      width: 100%;
      background: #16141f;
      border: 0.5px solid #2a2440;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #d8d0f0;
      outline: none;
      transition: border-color 0.15s;
    }
    .field-input:focus { border-color: #7c3aed; }
    .field-input::placeholder { color: #3a3860; }
    .field { margin-bottom: 14px; }

    .error-box {
      background: #2d1020;
      border: 0.5px solid #7c3060;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12.5px;
      color: #f07090;
      margin-bottom: 16px;
    }

    .btn-signin {
      width: 100%;
      background: #7c3aed;
      color: #f0e8ff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn-signin:hover { background: #6d30d4; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #2a2440;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: #2a2440;
    }
    .divider span { color: #3a3860; white-space: nowrap; }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #ffffff;
      color: #1a1a2e;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-google:hover { background: #f0f0f0; }

    .register-note {
      font-size: 11.5px;
      color: #3a3860;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Chith<span>ara</span></div>
    <div class="tagline">AI Music Generator</div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" action="">
      {% csrf_token %}
      <div class="field">
        <label class="field-label" for="email">Email</label>
        <input class="field-input" type="email" id="email" name="email"
               placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="field">
        <label class="field-label" for="password">Password</label>
        <input class="field-input" type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button class="btn-signin" type="submit">Sign In</button>
    </form>

    <div class="divider"><span>or</span></div>

    <a href="{% provider_login_url 'google' %}" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </a>

    <div class="register-note">New here? Signing in with your email creates an account automatically.</div>
  </div>
</body>
</html>
