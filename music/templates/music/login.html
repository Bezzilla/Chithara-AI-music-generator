<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chithara – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e8e6f0;
    }
    .card {
      background: #0e0e16;
      border: 0.5px solid #2a2a3a;
      border-radius: 18px;
      padding: 44px 40px;
      width: 400px;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #c8b8ff;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .logo span { color: #7c5cbf; }
    .tagline { font-size: 13px; color: #6860a0; margin-bottom: 36px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field label { font-size: 12px; color: #8884a0; font-weight: 400; }
    .field input {
      background: #16141f;
      border: 0.5px solid #2a2440;
      border-radius: 8px;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      color: #d8d0f0;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #7c3aed; }
    .optional { color: #50508a; font-size: 11px; }
    .btn {
      width: 100%;
      background: #7c3aed;
      color: #f0e8ff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .btn:hover { background: #6d30d4; }
    .error {
      background: #2d1020;
      border: 0.5px solid #7c3060;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12.5px;
      color: #f07090;
      margin-bottom: 16px;
    }
    .note {
      font-size: 11.5px;
      color: #3a3870;
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 0.5px solid #1a1a28;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Chith<span>ara</span></div>
    <div class="tagline">AI Music Generator — sign in to continue</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus />
      </div>
      <div class="field">
        <label>Display Name <span class="optional">(optional)</span></label>
        <input type="text" name="display_name" placeholder="Your name" />
      </div>
      <button class="btn" type="submit">Sign In</button>
    </form>

    <div class="note">Google OAuth support coming in a future update.</div>
  </div>
</body>
</html>
